name: Release Electron App

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
      
      - name: Extract Product Version from File
        id: get_version
        shell: powershell
        run: |
          $Version = "0.0.0"
          $TagName = "v0.0.0"
          $VersionFile = "version_info.txt"
          
          if (Test-Path $VersionFile) {
            $ProductVersionLine = Get-Content $VersionFile | Select-String -Pattern "ProductVersion', u'(.*?)'"
            
            if ($ProductVersionLine) {
              $Version = $ProductVersionLine.Matches[0].Groups[1].Value.Trim()
              $TagName = "v" + $Version
            }
          }
          
          if ([string]::IsNullOrEmpty($Version)) { $Version = "0.0.0" }
          if ([string]::IsNullOrEmpty($TagName)) { $TagName = "v0.0.0" }
          $OutputFile = $env:GITHUB_OUTPUT
          "version=$Version" | Out-File -FilePath $OutputFile -Encoding UTF8 -Append
          "tag=$TagName" | Out-File -FilePath $OutputFile -Encoding UTF8 -Append

      - name: Build and Package Electron
        run: |
          # Sync package.json version with extracted version using Node.js (safe encoding)
          node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); pkg.version = process.argv[1]; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));" ${{ steps.get_version.outputs.version }}
          
          # Execute build
          npm run electron:build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          
      - name: Check for Release Tag and Get Message
        id: check_release
        shell: powershell
        run: |
          $CommitSubject = git log -1 --pretty=format:%s
          $CommitBody = git log -1 --pretty=format:%b
          $isRelease = "false"
          
          if ($CommitSubject -like "*[release]*") {
            $isRelease = "true"
          }
          $OutputFile = $env:GITHUB_OUTPUT
          $Delimiter = "EOF" + (Get-Date -Format 'HHmmss')
          $BodyContent = $CommitBody
          # Saída 1: Simples (is_release)
          "is_release=$isRelease" | Out-File -FilePath $OutputFile -Encoding UTF8 -Append
          
          # Saída 2: Simples (commit_subject)
          "commit_subject=$CommitSubject" | Out-File -FilePath $OutputFile -Encoding UTF8 -Append
          # Saída 3: Multiline (commit_body)
          "commit_body<<$Delimiter" | Out-File -FilePath $OutputFile -Encoding UTF8 -Append
          $BodyContent | Out-File -FilePath $OutputFile -Encoding UTF8 -Append
          $Delimiter | Out-File -FilePath $OutputFile -Encoding UTF8 -Append

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: ORPGME v${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          files: release/ORPGME.exe
          body: |
            ## 🚀 New Windows Version Available
            
            Version extracted from `version_info.txt`: **${{ steps.get_version.outputs.version }}**
            
            Automatic build generated from commit:
            > ${{ steps.check_release.outputs.commit_subject }}
            
            ---
            
            ${{ steps.check_release.outputs.commit_body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
